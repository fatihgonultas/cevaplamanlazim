<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffd6e8">
  <title>Buluşmaya kalan süre</title>
  <style>
    :root {
      --ink: #642648;
      --muted: #87536c;
      --glass: rgba(255, 255, 255, 0.43);
      --stroke: rgba(255, 255, 255, 0.64);
      --shadow: 0 28px 70px rgba(154, 67, 112, 0.28);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-x: hidden;
      background: #ffd6e8;
    }

    body {
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 255, 255, 0.9) 0 7%, transparent 23%),
        radial-gradient(circle at 88% 10%, rgba(255, 237, 251, 0.86) 0 9%, transparent 26%),
        linear-gradient(135deg, #ffe0ef 0%, #ffd7e8 35%, #e8d5ff 72%, #fff2fb 100%);
    }

    .page {
      display: grid;
      min-height: 100svh;
      place-items: center;
      padding:
        max(18px, var(--safe-top))
        max(16px, var(--safe-right))
        max(18px, var(--safe-bottom))
        max(16px, var(--safe-left));
    }

    .card {
      width: min(100%, 390px);
      padding: clamp(24px, 7vw, 34px) clamp(16px, 5.6vw, 28px);
      border: 1px solid var(--stroke);
      border-radius: 30px;
      text-align: center;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.28)),
        var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(1.25);
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
    }

    .pixel-art {
      width: min(78vw, 300px);
      max-height: 42vh;
      object-fit: cover;
      border-radius: 24px;
      border: 3px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 18px 45px rgba(190, 70, 120, 0.25);
      display: block;
      margin: 0 auto 22px;
    }

    h1 {
      width: min(100%, 320px);
      margin: 0 auto 16px;
      color: #6f244c;
      font-size: clamp(1.42rem, 6vw, 2rem);
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .countdown {
      width: 100%;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .countdown-box {
      min-width: 0;
      padding: 13px 5px 11px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 18px;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.69), rgba(255, 255, 255, 0.31));
      box-shadow: 0 12px 26px rgba(139, 57, 104, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .countdown-number {
      display: block;
      color: #d72d73;
      font-size: clamp(1.28rem, 5.8vw, 1.72rem);
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .countdown-number.tick {
      animation: numberTick 280ms ease;
    }

    .countdown-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(0.6rem, 2.7vw, 0.72rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .expired-message {
      display: none;
      width: min(100%, 310px);
      margin: 0 auto;
      padding: 17px 15px;
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: 0 14px 30px rgba(139, 57, 104, 0.13);
      color: #7a2a51;
      font-size: clamp(1.02rem, 4.2vw, 1.14rem);
      font-weight: 800;
      line-height: 1.35;
      text-wrap: balance;
    }

    .countdown.is-finished .countdown-grid {
      display: none;
    }

    .countdown.is-finished .expired-message {
      display: block;
    }

    @keyframes numberTick {
      0% {
        transform: translateY(0) scale(1);
      }
      45% {
        transform: translateY(-3px) scale(1.04);
      }
      100% {
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 380px) {
      .card {
        padding: 22px 14px;
        border-radius: 28px;
      }

      .pixel-art {
        width: min(76vw, 260px);
        max-height: 38vh;
        margin-bottom: 18px;
      }

      h1 {
        margin-bottom: 14px;
        font-size: clamp(1.3rem, 6.2vw, 1.64rem);
      }

      .countdown-grid {
        gap: 6px;
      }

      .countdown-box {
        padding: 12px 4px 10px;
        border-radius: 16px;
      }
    }

    @media (min-width: 700px) {
      .card {
        width: min(420px, 100%);
      }

      .page {
        padding-block: 32px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-live="polite">
      <img src="./betul-pixel.png" alt="Pixel art" class="pixel-art" />

      <h1>Buluşmaya kalan süre</h1>

      <div class="countdown" id="countdown">
        <div class="countdown-grid" aria-label="Geri sayım">
          <div class="countdown-box">
            <span class="countdown-number" data-unit="days">00</span>
            <span class="countdown-label">Gün</span>
          </div>
          <div class="countdown-box">
            <span class="countdown-number" data-unit="hours">00</span>
            <span class="countdown-label">Saat</span>
          </div>
          <div class="countdown-box">
            <span class="countdown-number" data-unit="minutes">00</span>
            <span class="countdown-label">Dakika</span>
          </div>
          <div class="countdown-box">
            <span class="countdown-number" data-unit="seconds">00</span>
            <span class="countdown-label">Saniye</span>
          </div>
        </div>

        <p class="expired-message">Vakit geldi 🌸</p>
      </div>
    </section>
  </main>

  <script>
    const targetDate = new Date("2026-05-29T16:00:00+03:00");

    const countdown = document.getElementById("countdown");
    const numberElements = {
      days: document.querySelector('[data-unit="days"]'),
      hours: document.querySelector('[data-unit="hours"]'),
      minutes: document.querySelector('[data-unit="minutes"]'),
      seconds: document.querySelector('[data-unit="seconds"]')
    };

    let countdownTimer = null;

    function padNumber(value) {
      return String(value).padStart(2, "0");
    }

    function setNumber(unit, value) {
      const element = numberElements[unit];
      const nextValue = padNumber(value);

      if (element.textContent === nextValue) {
        return;
      }

      element.textContent = nextValue;
      element.classList.remove("tick");

      window.requestAnimationFrame(() => {
        element.classList.add("tick");
      });
    }

    function finishCountdown() {
      countdown.classList.add("is-finished");

      if (countdownTimer) {
        window.clearInterval(countdownTimer);
      }
    }

    function updateCountdown() {
      const remaining = targetDate.getTime() - Date.now();

      if (remaining <= 0) {
        finishCountdown();
        return;
      }

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      setNumber("days", days);
      setNumber("hours", hours);
      setNumber("minutes", minutes);
      setNumber("seconds", seconds);
    }

    updateCountdown();
    countdownTimer = window.setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
